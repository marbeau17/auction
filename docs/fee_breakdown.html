<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVLPOS 松竹梅プラン - 月額リース料内訳シミュレーター</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; min-height: 100vh; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            cursor: pointer;
            margin-top: -9px;
            box-shadow: 0 2px 8px rgba(59,130,246,0.5);
            border: 2px solid #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: linear-gradient(90deg, #334155, #475569);
            border-radius: 3px;
        }
        input[type=range]:focus { outline: none; }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tier-ume { border-color: #f472b6; }
        .tier-take { border-color: #60a5fa; }
        .tier-matsu { border-color: #fbbf24; }

        .savings-pulse {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(34,197,94,0.3); }
            50% { box-shadow: 0 0 20px rgba(34,197,94,0.6); }
        }

        canvas { max-width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ---- Tier definitions ----
        const TIERS = {
            ume:   { label: '梅', sub: 'ベーシック',   color: '#f472b6', safety: 0.08,  yield: 0.085, am: 0.025, placement: 0.035, margin: 0.025, accounting: 50000 },
            take:  { label: '竹', sub: 'スタンダード', color: '#60a5fa', safety: 0.05,  yield: 0.08,  am: 0.02,  placement: 0.03,  margin: 0.02,  accounting: 50000 },
            matsu: { label: '松', sub: 'プレミアム',   color: '#fbbf24', safety: 0.03,  yield: 0.075, am: 0.015, placement: 0.025, margin: 0.015, accounting: 50000 },
        };

        const COMPONENTS = [
            { key: 'depreciation', label: '減価償却', color: '#94a3b8' },
            { key: 'dividend',     label: '投資家配当', color: '#3b82f6' },
            { key: 'am',           label: 'AM報酬',    color: '#22c55e' },
            { key: 'placement',    label: '私募取扱',   color: '#a855f7' },
            { key: 'accounting',   label: '会計費用',   color: '#f97316' },
            { key: 'margin',       label: 'マージン',   color: '#ef4444' },
        ];

        // ---- Calculation engine ----
        function calcTier(price, months, tier) {
            const annual = price / (months / 12);
            const depreciation = annual / 12;
            const dividend   = (price * tier.yield) / 12;
            const am         = (price * tier.am) / 12;
            const placement  = (price * tier.placement) / 12;
            const margin     = (price * tier.margin) / 12;
            const accounting = tier.accounting;

            const components = { depreciation, dividend, am, placement, accounting, margin };
            const total = Object.values(components).reduce((s, v) => s + v, 0);
            return { components, total };
        }

        function fmt(n) {
            return Math.round(n).toLocaleString('ja-JP');
        }
        function fmtMan(n) {
            return (n / 10000).toFixed(1);
        }

        // ---- Stacked Bar Chart ----
        function StackedBarChart({ data }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                const tierKeys = ['ume', 'take', 'matsu'];
                const labels = tierKeys.map(k => TIERS[k].label + 'プラン');

                const datasets = COMPONENTS.map(comp => ({
                    label: comp.label,
                    data: tierKeys.map(k => Math.round(data[k].components[comp.key])),
                    backgroundColor: comp.color,
                    borderColor: 'rgba(0,0,0,0.1)',
                    borderWidth: 1,
                    borderRadius: 2,
                }));

                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#cbd5e1', padding: 16, usePointStyle: true, pointStyleWidth: 12, font: { size: 12 } }
                            },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}円`
                                }
                            }
                        },
                        scales: {
                            x: {
                                stacked: true,
                                ticks: { color: '#94a3b8', font: { size: 14, weight: 'bold' } },
                                grid: { display: false }
                            },
                            y: {
                                stacked: true,
                                ticks: {
                                    color: '#94a3b8',
                                    callback: (v) => (v / 10000).toFixed(0) + '万円'
                                },
                                grid: { color: 'rgba(148,163,184,0.1)' }
                            }
                        }
                    },
                    plugins: [{
                        id: 'totalLabel',
                        afterDatasetsDraw(chart) {
                            const { ctx: c, data: d, scales } = chart;
                            const meta = chart.getDatasetMeta(d.datasets.length - 1);
                            meta.data.forEach((bar, i) => {
                                const total = d.datasets.reduce((s, ds) => s + ds.data[i], 0);
                                c.save();
                                c.fillStyle = '#e2e8f0';
                                c.font = 'bold 13px sans-serif';
                                c.textAlign = 'center';
                                c.fillText(`${(total/10000).toFixed(1)}万円`, bar.x, bar.y - 8);
                                c.restore();
                            });
                        }
                    }]
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data]);

            return <canvas ref={canvasRef} />;
        }

        // ---- Donut Chart ----
        function DonutChart({ tierKey, tierData, tierDef }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                const values = COMPONENTS.map(c => Math.round(tierData.components[c.key]));
                const colors = COMPONENTS.map(c => c.color);
                const labels = COMPONENTS.map(c => c.label);

                chartRef.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors,
                            borderColor: '#1e293b',
                            borderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        cutout: '65%',
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        const pct = ((ctx.raw / tierData.total) * 100).toFixed(1);
                                        return `${ctx.label}: ${ctx.raw.toLocaleString()}円 (${pct}%)`;
                                    }
                                }
                            }
                        }
                    },
                    plugins: [{
                        id: 'centerText',
                        beforeDraw(chart) {
                            const { ctx: c, chartArea } = chart;
                            const cx = (chartArea.left + chartArea.right) / 2;
                            const cy = (chartArea.top + chartArea.bottom) / 2;
                            c.save();
                            c.textAlign = 'center';
                            c.textBaseline = 'middle';
                            c.fillStyle = '#94a3b8';
                            c.font = '11px sans-serif';
                            c.fillText('月額合計', cx, cy - 14);
                            c.fillStyle = tierDef.color;
                            c.font = 'bold 16px sans-serif';
                            c.fillText(`${fmtMan(tierData.total)}万円`, cx, cy + 8);
                            c.restore();
                        }
                    }]
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [tierData]);

            return (
                <div className="text-center">
                    <div className="mb-2">
                        <span className="text-2xl font-bold" style={{color: tierDef.color}}>{tierDef.label}</span>
                        <span className="text-slate-400 text-sm ml-2">{tierDef.sub}</span>
                    </div>
                    <canvas ref={canvasRef} />
                </div>
            );
        }

        // ---- Savings Calculator ----
        function SavingsCalc({ data, months }) {
            const umeTotal = data.ume.total;
            const takeSave = umeTotal - data.take.total;
            const matsuSave = umeTotal - data.matsu.total;

            const Card = ({ plan, planColor, monthly, yearly, total }) => (
                <div className="glass rounded-xl p-5 savings-pulse flex-1 border border-green-500/30">
                    <div className="text-sm text-slate-400 mb-1">梅プラン比</div>
                    <div className="text-lg font-bold mb-3">
                        <span style={{color: planColor}}>{plan}</span>
                        <span className="text-slate-300">プランに変更すると</span>
                    </div>
                    <div className="space-y-2">
                        <div className="flex justify-between items-center">
                            <span className="text-slate-400 text-sm">月額削減</span>
                            <span className="text-green-400 font-bold text-lg">-{fmt(monthly)}円</span>
                        </div>
                        <div className="flex justify-between items-center">
                            <span className="text-slate-400 text-sm">年間削減</span>
                            <span className="text-green-400 font-bold text-lg">-{fmtMan(yearly)}万円</span>
                        </div>
                        <div className="border-t border-slate-600 pt-2 flex justify-between items-center">
                            <span className="text-slate-400 text-sm">リース期間合計</span>
                            <span className="text-green-300 font-extrabold text-xl">-{fmtMan(total)}万円</span>
                        </div>
                    </div>
                    <div className="mt-4 bg-green-500/10 rounded-lg p-3 text-center">
                        <span className="text-green-400 font-bold text-base">
                            {plan}プランで年間{fmtMan(yearly)}万円お得
                        </span>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row gap-4">
                    <Card plan="竹" planColor="#60a5fa" monthly={takeSave} yearly={takeSave * 12} total={takeSave * months} />
                    <Card plan="松" planColor="#fbbf24" monthly={matsuSave} yearly={matsuSave * 12} total={matsuSave * months} />
                </div>
            );
        }

        // ---- Data Table ----
        function DataTable({ data }) {
            const tierKeys = ['ume', 'take', 'matsu'];
            const TAX = 1.10;

            return (
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead>
                            <tr className="border-b border-slate-600">
                                <th className="text-left text-slate-400 py-3 px-4 font-medium">費用項目</th>
                                {tierKeys.map(k => (
                                    <th key={k} className="text-right py-3 px-4 font-bold" style={{color: TIERS[k].color}}>
                                        {TIERS[k].label}プラン
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {COMPONENTS.map((comp, i) => (
                                <tr key={comp.key} className={`border-b border-slate-700/50 ${i % 2 === 0 ? 'bg-white/[0.02]' : ''}`}>
                                    <td className="py-3 px-4 flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-sm inline-block" style={{backgroundColor: comp.color}}></span>
                                        <span className="text-slate-300">{comp.label}</span>
                                    </td>
                                    {tierKeys.map(k => (
                                        <td key={k} className="text-right py-3 px-4 text-slate-200 font-mono">
                                            {fmt(data[k].components[comp.key])}円
                                        </td>
                                    ))}
                                </tr>
                            ))}
                            <tr className="border-t-2 border-slate-500 bg-white/[0.03]">
                                <td className="py-3 px-4 text-slate-200 font-bold">月額合計（税抜）</td>
                                {tierKeys.map(k => (
                                    <td key={k} className="text-right py-3 px-4 font-bold font-mono" style={{color: TIERS[k].color}}>
                                        {fmt(data[k].total)}円
                                    </td>
                                ))}
                            </tr>
                            <tr className="bg-white/[0.05]">
                                <td className="py-3 px-4 text-white font-extrabold">月額合計（税込 10%）</td>
                                {tierKeys.map(k => (
                                    <td key={k} className="text-right py-3 px-4 font-extrabold text-lg font-mono" style={{color: TIERS[k].color}}>
                                        {fmt(data[k].total * TAX)}円
                                    </td>
                                ))}
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
        }

        // ---- Main App ----
        function App() {
            const [price, setPrice] = useState(5000000);
            const [months, setMonths] = useState(36);

            const data = {};
            for (const [k, tier] of Object.entries(TIERS)) {
                data[k] = calcTier(price, months, tier);
            }

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    {/* Header */}
                    <div className="text-center mb-10">
                        <h1 className="text-3xl md:text-4xl font-extrabold text-white mb-2">
                            CVLPOS 松竹梅プラン
                        </h1>
                        <p className="text-slate-400 text-lg">月額リース料 内訳シミュレーター</p>
                        <div className="flex justify-center gap-6 mt-4">
                            {Object.values(TIERS).map(t => (
                                <span key={t.label} className="flex items-center gap-1.5">
                                    <span className="w-3 h-3 rounded-full" style={{backgroundColor: t.color}}></span>
                                    <span className="text-slate-300 text-sm font-medium">{t.label}（{t.sub}）</span>
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* Input Controls */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <div className="flex justify-between items-baseline mb-2">
                                    <label className="text-slate-300 font-medium">車両取得価格</label>
                                    <span className="text-2xl font-bold text-blue-400">{(price / 10000).toFixed(0)}万円</span>
                                </div>
                                <input
                                    type="range" min={2000000} max={20000000} step={100000}
                                    value={price}
                                    onChange={e => setPrice(Number(e.target.value))}
                                    className="w-full"
                                />
                                <div className="flex justify-between text-xs text-slate-500 mt-1">
                                    <span>200万円</span><span>2,000万円</span>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between items-baseline mb-2">
                                    <label className="text-slate-300 font-medium">リース期間</label>
                                    <span className="text-2xl font-bold text-purple-400">{months}ヶ月<span className="text-base text-slate-500 ml-1">({(months/12).toFixed(1)}年)</span></span>
                                </div>
                                <input
                                    type="range" min={12} max={84} step={6}
                                    value={months}
                                    onChange={e => setMonths(Number(e.target.value))}
                                    className="w-full"
                                />
                                <div className="flex justify-between text-xs text-slate-500 mt-1">
                                    <span>12ヶ月</span><span>84ヶ月</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Stacked Bar Chart */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-white text-xl font-bold mb-4">プラン別 月額費用内訳（積み上げ棒グラフ）</h2>
                        <div style={{height: '380px'}}>
                            <StackedBarChart data={data} />
                        </div>
                    </div>

                    {/* Donut Charts */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-white text-xl font-bold mb-4">構成比率（ドーナツチャート）</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {Object.entries(TIERS).map(([k, tier]) => (
                                <DonutChart key={k} tierKey={k} tierData={data[k]} tierDef={tier} />
                            ))}
                        </div>
                        {/* Shared legend */}
                        <div className="flex flex-wrap justify-center gap-4 mt-4 pt-4 border-t border-slate-700">
                            {COMPONENTS.map(c => (
                                <span key={c.key} className="flex items-center gap-1.5 text-xs text-slate-400">
                                    <span className="w-2.5 h-2.5 rounded-sm" style={{backgroundColor: c.color}}></span>
                                    {c.label}
                                </span>
                            ))}
                        </div>
                    </div>

                    {/* Savings Calculator */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-white text-xl font-bold mb-4">コスト削減シミュレーション</h2>
                        <p className="text-slate-400 text-sm mb-4">梅（ベーシック）プランを基準とした削減額</p>
                        <SavingsCalc data={data} months={months} />
                    </div>

                    {/* Data Table */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-white text-xl font-bold mb-4">詳細データテーブル</h2>
                        <DataTable data={data} />
                    </div>

                    {/* Parameters Reference */}
                    <div className="glass rounded-2xl p-6 mb-8">
                        <h2 className="text-white text-lg font-bold mb-3">パラメータ一覧</h2>
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs">
                                <thead>
                                    <tr className="border-b border-slate-600">
                                        <th className="text-left text-slate-400 py-2 px-3">パラメータ</th>
                                        {Object.values(TIERS).map(t => (
                                            <th key={t.label} className="text-right py-2 px-3" style={{color: t.color}}>{t.label}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="text-slate-300">
                                    <tr className="border-b border-slate-700/50"><td className="py-2 px-3">安全率</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{(t.safety*100).toFixed(0)}%</td>)}</tr>
                                    <tr className="border-b border-slate-700/50 bg-white/[0.02]"><td className="py-2 px-3">投資家利回り</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{(t.yield*100).toFixed(1)}%</td>)}</tr>
                                    <tr className="border-b border-slate-700/50"><td className="py-2 px-3">AM報酬率</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{(t.am*100).toFixed(1)}%</td>)}</tr>
                                    <tr className="border-b border-slate-700/50 bg-white/[0.02]"><td className="py-2 px-3">私募取扱手数料率</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{(t.placement*100).toFixed(1)}%</td>)}</tr>
                                    <tr className="border-b border-slate-700/50"><td className="py-2 px-3">マージン率</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{(t.margin*100).toFixed(1)}%</td>)}</tr>
                                    <tr><td className="py-2 px-3">会計費用（月額固定）</td>
                                        {Object.values(TIERS).map(t => <td key={t.label} className="text-right py-2 px-3">{fmt(t.accounting)}円</td>)}</tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="text-center text-slate-600 text-xs pb-8">
                        CVLPOS Fee Breakdown Simulator v1.0
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
