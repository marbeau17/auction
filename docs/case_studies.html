        /* ── Animated Counter ── */
        function AnimatedCounter({ end, duration=2000, prefix="", suffix="", decimals=0 }) {
            const [val, setVal] = useState(0);
            const ref = useRef(null);
            const started = useRef(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !started.current) {
                        started.current = true;
                        const start = performance.now();
                        const animate = (now) => {
                            const progress = Math.min((now - start) / duration, 1);
                            const eased = 1 - Math.pow(1 - progress, 3);
                            setVal(eased * end);
                            if (progress < 1) requestAnimationFrame(animate);
                        };
                        requestAnimationFrame(animate);
                    }
                }, { threshold: 0.3 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [end, duration]);

            return <span ref={ref}>{prefix}{decimals > 0 ? val.toFixed(decimals) : Math.round(val).toLocaleString()}{suffix}</span>;
        }

        }

        /* ── Before / After ── */
        function BeforeAfter({ cs }) {
            return (
                <div className="grid md:grid-cols-2 gap-6 mt-6 animate-fade-in-up" style={{ animationDelay: '0.35s' }}>
                    <div className="rounded-xl border border-red-200 overflow-hidden">
                        <div className="bg-red-50 px-5 py-3 border-b border-red-200">
                            <h5 className="font-bold text-red-700 flex items-center gap-2">
                                <span className="w-3 h-3 bg-red-400 rounded-full"></span>
                                {cs.before.title}
                            </h5>
                        </div>
                        <div className="p-5 bg-white space-y-2.5">
                            {cs.before.items.map((item, i) => (
                                <div key={i} className="flex items-center gap-2 text-sm text-gray-600">
                                    <span className="text-red-400">&#x2717;</span>
                                    {item}
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className={`rounded-xl border ${cs.borderColor} overflow-hidden ${cs.recommended ? 'animate-pulse-glow' : ''}`}>
                        <div className={`${cs.lightBg} px-5 py-3 border-b ${cs.borderColor}`}>
                            <h5 className={`font-bold ${cs.textColor} flex items-center gap-2`}>
                                <span className={`w-3 h-3 rounded-full`} style={{ background: cs.colorHex }}></span>
                                {cs.after.title}
                            </h5>
                        </div>
                        <div className="p-5 bg-white space-y-2.5">
                            {cs.after.items.map((item, i) => (
                                <div key={i} className="flex items-center gap-2 text-sm text-gray-600">
                                    <CheckCircle size={14} c="text-green-500" />
                                    {item}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        /* ── Timeline ── */
        function Timeline({ cs }) {
            return (
                <div className="mt-6 flex items-center gap-4 p-4 rounded-xl bg-gradient-to-r from-gray-50 to-white border border-gray-200 animate-fade-in-up" style={{ animationDelay: '0.45s' }}>
                    <CalendarIcon size={22} c="text-gray-400" />
                    <div>
                        <div className="text-xs text-gray-400 uppercase tracking-wide font-semibold">導入スケジュール</div>
                        <div className="text-sm font-bold text-gray-700 mt-0.5">{cs.timeline}</div>
                    </div>
                    <div className="ml-auto flex items-center gap-2">
                        <div className={`text-2xl font-black ${cs.textColor}`}>{cs.timelineDays}</div>
                        <div className="text-xs text-gray-500 leading-tight">日で<br/>完了</div>
                    </div>
                </div>
            );
        }

        /* ── CTA Button ── */
        function CTAButton({ cs }) {
            return (
                <div className="mt-8 text-center animate-fade-in-up" style={{ animationDelay: '0.55s' }}>
                    <button className={`inline-flex items-center gap-3 px-8 py-4 bg-gradient-to-r ${cs.bgGrad} text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300`}>
                        このプランで相談する
                        <ArrowRight size={20} />
                    </button>
                    <p className="text-xs text-gray-400 mt-3">無料相談・お見積りはお気軽にどうぞ</p>
                </div>
            );
        }

        /* ── Case Detail ── */
        function CaseDetail({ cs }) {
            return (
                <div key={cs.id} className="max-w-4xl mx-auto mt-8 space-y-0">
                    <ProfileCard cs={cs} />
                    <div className="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 md:p-8 mt-6">
                        <ResultsSection cs={cs} />
                        <BeforeAfter cs={cs} />
                        <Timeline cs={cs} />
                        <CTAButton cs={cs} />
                    </div>
                </div>
            );
        }

        /* ── ROI Calculator ── */
        function ROICalculator() {
            const [vehicleCount, setVehicleCount] = useState(10);
            const [avgPrice, setAvgPrice] = useState(500);

            const totalAsset = vehicleCount * avgPrice;

            const tiers = [
                {
                    name: '梅プラン',
                    label: '梅',
                    color: 'pink',
                    textColor: 'text-pink-700',
                    bgColor: 'bg-pink-50',
                    borderColor: 'border-pink-200',
                    grad: 'from-pink-500 to-rose-600',
                    rate: 0.032,
                    desc: 'シンプル・スピード重視',
                    features: ['基本リースバック', '最短2週間で資金化', '標準サポート'],
                },
                {
                    name: '竹プラン',
                    label: '竹',
                    color: 'green',
                    textColor: 'text-green-700',
                    bgColor: 'bg-green-50',
                    borderColor: 'border-green-200',
                    grad: 'from-green-500 to-emerald-600',
                    rate: 0.028,
                    desc: 'AI分析でコスト最適化',
                    recommended: true,
                    features: ['AI市場分析', 'NAV最適化', '年間300万円相当の削減効果'],
                },
                {
                    name: '松プラン',
                    label: '松',
                    color: 'amber',
                    textColor: 'text-amber-700',
                    bgColor: 'bg-amber-50',
                    borderColor: 'border-amber-200',
                    grad: 'from-amber-500 to-orange-600',
                    rate: 0.024,
                    desc: '専任AM+フル機能',
                    features: ['専任AM配置', 'ダッシュボード', 'ボリュームディスカウント'],
                },
            ];

            return (
                <section className="max-w-6xl mx-auto px-6 py-16">
                    <div className="text-center mb-10">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-blue-50 rounded-full text-blue-700 text-sm font-semibold mb-4">
                            <CalculatorIcon size={16} />
                            ROIシミュレーター
                        </div>
                        <h2 className="text-3xl font-bold text-gray-800">プラン別コスト比較</h2>
                        <p className="text-gray-500 mt-2">保有台数と平均車両価格を入力して、各プランの月額コストと年間削減額を比較できます。</p>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 md:p-8 mb-10">
                        <div className="grid md:grid-cols-2 gap-8">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">
                                    リースバック対象台数
                                </label>
                                <input
                                    type="range" min="1" max="100" value={vehicleCount}
                                    onChange={(e) => setVehicleCount(Number(e.target.value))}
                                />
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                    <span>1台</span>
                                    <span className="text-lg font-black text-blue-600">{vehicleCount}台</span>
                                    <span>100台</span>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">
                                    平均車両価格（万円）
                                </label>
                                <input
                                    type="range" min="100" max="2000" step="50" value={avgPrice}
                                    onChange={(e) => setAvgPrice(Number(e.target.value))}
                                />
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                    <span>100万円</span>
                                    <span className="text-lg font-black text-blue-600">{avgPrice.toLocaleString()}万円</span>
                                    <span>2,000万円</span>
                                </div>
                            </div>
                        </div>
                        <div className="mt-6 text-center p-4 bg-slate-50 rounded-xl">
                            <span className="text-sm text-gray-500">総資産評価額：</span>
                            <span className="text-2xl font-black text-slate-800 ml-2">{totalAsset.toLocaleString()}万円</span>
                            <span className="text-sm text-gray-500 ml-1">（{(totalAsset / 10000).toFixed(1)}億円）</span>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6">
                        {tiers.map((tier, idx) => {
                            const monthlyLease = Math.round(totalAsset * tier.rate);
                            const annualCost = monthlyLease * 12;
                            const baseTierMonthly = Math.round(totalAsset * tiers[0].rate);
                            const savings = (baseTierMonthly - monthlyLease) * 12;
                            const fundingEstimate = Math.round(totalAsset * 0.7);

                            return (
                                <div key={idx} className={`relative rounded-2xl overflow-hidden shadow-lg border ${tier.borderColor} ${tier.recommended ? 'ring-2 ring-green-400 transform md:-translate-y-2' : ''}`}>
                                    {tier.recommended && (
                                        <div className="absolute top-0 left-0 right-0 bg-gradient-to-r from-green-500 to-emerald-500 text-white text-center text-xs font-bold py-1.5 flex items-center justify-center gap-1">
                                            <StarIcon size={12} /> おすすめプラン
                                        </div>
                                    )}
                                    <div className={`p-6 ${tier.recommended ? 'pt-10' : ''}`}>
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className={`w-10 h-10 rounded-full bg-gradient-to-br ${tier.grad} text-white flex items-center justify-center font-bold text-lg`}>
                                                {tier.label}
                                            </span>
                                            <div>
                                                <h4 className="font-bold text-gray-800">{tier.name}</h4>
                                                <p className="text-xs text-gray-500">{tier.desc}</p>
                                            </div>
                                        </div>

                                        <div className={`mt-5 p-4 rounded-xl ${tier.bgColor}`}>
                                            <div className="text-xs text-gray-500 mb-1">推定月額リース料</div>
                                            <div className={`text-3xl font-black ${tier.textColor}`}>
                                                {monthlyLease.toLocaleString()}<span className="text-sm ml-1">万円/月</span>
                                            </div>
                                        </div>

                                        <div className="mt-4 space-y-3 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-500">推定資金調達額</span>
                                                <span className="font-bold text-gray-800">{fundingEstimate.toLocaleString()}万円</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-500">年間リース料</span>
                                                <span className="font-bold text-gray-800">{annualCost.toLocaleString()}万円</span>
                                            </div>
                                            {savings > 0 && (
                                                <div className="flex justify-between p-2 bg-green-50 rounded-lg border border-green-100">
                                                    <span className="text-green-700 font-semibold">梅比 年間削減額</span>
                                                    <span className="font-black text-green-700">▲{savings.toLocaleString()}万円</span>
                                                </div>
                                            )}
                                        </div>

                                        <div className="mt-5 pt-4 border-t border-gray-100 space-y-2">
                                            {tier.features.map((f, i) => (
                                                <div key={i} className="flex items-center gap-2 text-xs text-gray-600">
                                                    <CheckCircle size={14} c="text-green-500" />
                                                    {f}
                                                </div>
                                            ))}
                                        </div>

                                        <button className={`mt-5 w-full py-3 rounded-xl font-bold text-sm transition-all duration-300
                                            ${tier.recommended
                                                ? `bg-gradient-to-r ${tier.grad} text-white shadow-lg hover:shadow-xl`
                                                : `border-2 ${tier.borderColor} ${tier.textColor} hover:${tier.bgColor}`
                                            }`}>
                                            このプランで相談する
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </section>
            );
        }

        /* ── Comparison Summary ── */
        function ComparisonSummary() {
            const rows = [
                { label: '対象企業規模', ume: '小規模（〜10台）', take: '中規模（10〜50台）', matsu: '大規模（50台〜）' },
                { label: '資金化スピード', ume: '最短2週間', take: '約1ヶ月', matsu: '段階的に3ヶ月' },
                { label: 'AI分析', ume: '---', take: 'NAV分析・最適化', matsu: 'フル機能' },
                { label: '専任AM', ume: '---', take: '---', matsu: '配置あり' },
                { label: 'ダッシュボード', ume: '---', take: '基本レポート', matsu: 'リアルタイム' },
                { label: 'コスト優位性', ume: '標準料率', take: '月額約7%お得', matsu: '月額約12%お得' },
            ];

            return (
                <section className="max-w-5xl mx-auto px-6 py-16">
                    <h2 className="text-2xl font-bold text-center text-gray-800 mb-8">プラン比較一覧</h2>
                    <div className="overflow-x-auto">
                        <table className="w-full bg-white rounded-2xl shadow-lg overflow-hidden">
                            <thead>
                                <tr>
                                    <th className="px-5 py-4 text-left text-sm font-semibold text-gray-500 bg-gray-50"></th>
                                    <th className="px-5 py-4 text-center bg-pink-50">
                                        <span className="inline-flex items-center gap-1 text-pink-700 font-bold">
                                            <span className="w-6 h-6 bg-gradient-to-br from-pink-500 to-rose-600 text-white rounded-full flex items-center justify-center text-xs">梅</span>
                                            梅プラン
                                        </span>
                                    </th>
                                    <th className="px-5 py-4 text-center bg-green-50 relative">
                                        <span className="absolute -top-0 left-1/2 -translate-x-1/2 bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-b-md font-bold">おすすめ</span>
                                        <span className="inline-flex items-center gap-1 text-green-700 font-bold">
                                            <span className="w-6 h-6 bg-gradient-to-br from-green-500 to-emerald-600 text-white rounded-full flex items-center justify-center text-xs">竹</span>
                                            竹プラン
                                        </span>
                                    </th>
                                    <th className="px-5 py-4 text-center bg-amber-50">
                                        <span className="inline-flex items-center gap-1 text-amber-700 font-bold">
                                            <span className="w-6 h-6 bg-gradient-to-br from-amber-500 to-orange-600 text-white rounded-full flex items-center justify-center text-xs">松</span>
                                            松プラン
                                        </span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((row, i) => (
                                    <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'}>
                                        <td className="px-5 py-3.5 text-sm font-semibold text-gray-700 border-r border-gray-100">{row.label}</td>
                                        <td className="px-5 py-3.5 text-sm text-center text-gray-600">{row.ume}</td>
                                        <td className="px-5 py-3.5 text-sm text-center text-gray-600 bg-green-50/30 font-medium">{row.take}</td>
                                        <td className="px-5 py-3.5 text-sm text-center text-gray-600">{row.matsu}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </section>
            );
        }

        /* ── Footer CTA ── */
        function FooterCTA() {
            return (
                <section className="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 text-white py-16">
                    <div className="max-w-4xl mx-auto px-6 text-center">
                        <h2 className="text-3xl font-bold mb-4">まずは無料相談から</h2>
                        <p className="text-blue-200 mb-8 leading-relaxed">
                            お客様の保有車両・ニーズに合わせた最適プランをご提案いたします。<br />
                            経験豊富なコンサルタントが丁寧にご対応いたします。
                        </p>
                        <div className="flex justify-center gap-4 flex-wrap">
                            <button className="px-8 py-4 bg-white text-blue-900 font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300 flex items-center gap-2">
                                無料相談を予約する
                                <ArrowRight size={18} />
                            </button>
                            <button className="px-8 py-4 border-2 border-white/30 text-white font-bold rounded-xl hover:bg-white/10 transition-all duration-300">
                                資料をダウンロード
                            </button>
                        </div>
                        <p className="text-xs text-blue-300 mt-10">CVLPOS - Commercial Vehicle Lease-back Pricing & Operations System</p>
                    </div>
                </section>
            );
        }

        /* ── App ── */
        function App() {
            const [activeCase, setActiveCase] = useState('take');
            const currentCase = cases.find(c => c.id === activeCase);

            return (
                <div className="min-h-screen bg-gray-50">
                    <Hero />

                    {/* Case Studies */}
                    <section className="max-w-6xl mx-auto px-6 py-16">
                        <div className="text-center mb-10">
                            <h2 className="text-3xl font-bold text-gray-800 mb-3">導入事例</h2>
                            <p className="text-gray-500">各プランの導入効果を実際の事例でご覧ください。</p>
                        </div>
                        <TabNav activeCase={activeCase} setActiveCase={setActiveCase} />
                        <CaseDetail cs={currentCase} />
                    </section>

                    <div className="border-t border-gray-200"></div>

                    {/* ROI Calculator */}
                    <ROICalculator />

                    <div className="border-t border-gray-200"></div>

                    {/* Comparison Table */}
                    <ComparisonSummary />

                    {/* Footer CTA */}
                    <FooterCTA />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
