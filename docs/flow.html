<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4者間リースバック契約スキーム図</title>
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (ブラウザ内でJSXを変換するため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* アニメーションの定義 */
        @keyframes flow-dash {
            to { stroke-dashoffset: -20; }
        }
        @keyframes flow-solid {
            to { stroke-dashoffset: -20; }
        }
        .anim-dash {
            stroke-dasharray: 6 4;
            animation: flow-dash 0.8s linear infinite;
        }
        .anim-solid {
            stroke-dasharray: 20 20;
            animation: flow-solid 1.2s linear infinite;
        }
        .fade-transition {
            transition: all 0.3s ease-in-out;
        }
        body { margin: 0; padding: 0; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div style="background:linear-gradient(90deg,#1e40af,#7c3aed);color:#fff;text-align:center;padding:10px 16px;font-size:14px;">
      8者間スキーム図（拡張版）はこちら &rarr; <a href="fund_scheme_v2.html" style="color:#fbbf24;font-weight:bold;text-decoration:underline;">fund_scheme_v2.html</a>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // === アイコンコンポーネント (Lucide iconsの代替SVG) ===
        const FileText = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const Truck = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><path d="M14 17h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
        );
        const Building2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        );
        const Landmark = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>
        );
        const Users = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        // === データ定義 ===
        const PHASES = [
          {
            id: 1,
            title: '① 車両売買契約書',
            category: '1. アセットの移動',
            parties: ['transport', 'curtis'],
            purpose: '運送事業者が現在所有している車両を、カーチスが買い取るための契約です。この契約に基づき、運送事業者に車両の買取代金（資金）が支払われます。',
          },
          {
            id: 2,
            title: '② 車両譲渡(売買)契約書',
            category: '1. アセットの移動',
            parties: ['curtis', 'spc'],
            purpose: 'カーチスが買い取った車両を、ファンドの器であるSPC（特別目的会社）に譲渡するための契約です。これにより、車両の「最終的な法的所有権」がSPCへ移転します。',
          },
          {
            id: 3,
            title: '③ マスターリース契約書',
            category: '2. リースに関する契約',
            parties: ['spc', 'curtis'],
            purpose: '所有者であるSPC（貸主＝マスターレッサー）が、カーチス（借主＝マスターレッシー）に対して車両を貸し出す大元の契約です。カーチスがSPCへ支払う「マスターリース料」の金額や条件が規定されます。',
          },
          {
            id: 4,
            title: '④ サブリース契約書',
            category: '2. リースに関する契約',
            parties: ['curtis', 'transport'],
            purpose: 'カーチス（転貸主＝サブレッサー）が、借り受けた車両を実利用者である運送事業者（転借主＝サブレッシー）に転貸する契約です。運送事業者が毎月支払う「サブリース料」や責任の所在などが定められます。',
          },
          {
            id: 5,
            title: '⑤ 匿名組合契約書',
            category: '3. 資金調達に関する契約',
            parties: ['investor', 'spc'],
            purpose: '投資家がSPCに対して車両の購入資金を出資し、SPCがリース事業から得た利益から投資家へ配当を支払うための契約です。投資家の責任を出資額のみに限定（有限責任）します。',
          }
        ];

        // ノードの中心座標 (viewBox: 800 x 480)
        const NODES = {
          investor: { id: 'investor', label: '投資家', icon: Users, x: 160, y: 100, role: '資金提供者' },
          spc: { id: 'spc', label: 'SPC (特別目的会社)', icon: Landmark, x: 640, y: 100, role: '最終法的所有者' },
          transport: { id: 'transport', label: '運送事業者', icon: Truck, x: 160, y: 380, role: '実利用者 (サブレッシー)' },
          curtis: { id: 'curtis', label: '株式会社カーチス', icon: Building2, x: 640, y: 380, role: 'ハブ (マスターレッシー)' }
        };

        // 矢印（フロー）の定義
        const FLOWS = [
          { id: 'f1a', phase: 1, from: 'transport', to: 'curtis', label: '車両 (売却)', color: '#3b82f6', offset: 15, isDash: false },
          { id: 'f1b', phase: 1, from: 'curtis', to: 'transport', label: '買取代金', color: '#10b981', offset: -15, isDash: true },
          { id: 'f2a', phase: 2, from: 'curtis', to: 'spc', label: '車両 (ファンド組入)', color: '#3b82f6', offset: 15, isDash: false },
          { id: 'f2b', phase: 2, from: 'spc', to: 'curtis', label: '譲渡代金', color: '#10b981', offset: -15, isDash: true },
          { id: 'f3a', phase: 3, from: 'spc', to: 'curtis', label: 'マスターリース (貸与)', color: '#f59e0b', offset: 15, isDash: false },
          { id: 'f3b', phase: 3, from: 'curtis', to: 'spc', label: 'マスターリース料', color: '#10b981', offset: -15, isDash: true },
          { id: 'f4a', phase: 4, from: 'curtis', to: 'transport', label: 'サブリース (転貸)', color: '#f59e0b', offset: 15, isDash: false },
          { id: 'f4b', phase: 4, from: 'transport', to: 'curtis', label: 'サブリース料', color: '#10b981', offset: -15, isDash: true },
          { id: 'f5a', phase: 5, from: 'investor', to: 'spc', label: '匿名組合出資', color: '#10b981', offset: -15, isDash: true },
          { id: 'f5b', phase: 5, from: 'spc', to: 'investor', label: '配当', color: '#10b981', offset: 15, isDash: true },
        ];

        function App() {
          const [activePhase, setActivePhase] = useState(null);

          const getLineCoords = (fromNode, toNode, offset) => {
            const n1 = NODES[fromNode];
            const n2 = NODES[toNode];
            const dx = n2.x - n1.x;
            const dy = n2.y - n1.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            
            const nx = -dy / length;
            const ny = dx / length;
            
            const padding = 85; 
            
            const startX = n1.x + (dx / length) * padding + nx * offset;
            const startY = n1.y + (dy / length) * padding + ny * offset;
            const endX = n2.x - (dx / length) * padding + nx * offset;
            const endY = n2.y - (dy / length) * padding + ny * offset;

            const midX = (startX + endX) / 2 + nx * 10;
            const midY = (startY + endY) / 2 + ny * 10;
            
            let angle = Math.atan2(dy, dx) * (180 / Math.PI);
            if (angle > 90 || angle < -90) angle += 180;

            return { startX, startY, endX, endY, midX, midY, angle };
          };

          const activePhaseData = PHASES.find(p => p.id === activePhase);

          return (
            <div className="flex flex-col min-h-screen text-slate-800 font-sans">
              <header className="bg-slate-900 text-white p-6 shadow-md">
                <div className="max-w-6xl mx-auto">
                  <h1 className="text-2xl font-bold tracking-tight">4者間リースバック契約スキーム</h1>
                  <p className="text-slate-400 mt-1 text-sm">各フェーズをクリックして、アセットと資金の流れを確認してください。</p>
                </div>
              </header>

              <main className="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <aside className="lg:col-span-4 flex flex-col gap-3">
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <h2 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                      <FileText size={16} />
                      契約フェーズの選択
                    </h2>
                    <div className="flex flex-col gap-2">
                      <button
                        onClick={() => setActivePhase(null)}
                        className={`text-left px-4 py-2 text-sm rounded-lg border transition-colors ${
                          activePhase === null 
                            ? 'bg-slate-800 text-white border-slate-800' 
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        全スキームを表示 (リセット)
                      </button>
                      
                      {PHASES.map((phase) => (
                        <button
                          key={phase.id}
                          onClick={() => setActivePhase(phase.id)}
                          className={`text-left px-4 py-3 rounded-lg border transition-all duration-200 flex flex-col gap-1 ${
                            activePhase === phase.id 
                              ? 'bg-blue-50 border-blue-400 shadow-sm' 
                              : 'bg-white border-slate-200 hover:border-blue-300 hover:bg-slate-50'
                          }`}
                        >
                          <span className="text-xs font-semibold text-slate-400">{phase.category}</span>
                          <span className={`font-bold ${activePhase === phase.id ? 'text-blue-700' : 'text-slate-700'}`}>
                            {phase.title}
                          </span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {activePhaseData && (
                    <div className="bg-blue-900 text-white p-5 rounded-xl shadow-md mt-auto animate-in fade-in slide-in-from-bottom-4 transition-all duration-300">
                      <div className="flex items-center gap-2 mb-2">
                        <Info size={18} className="text-blue-300" />
                        <h3 className="font-bold text-lg">{activePhaseData.title}</h3>
                      </div>
                      <p className="text-sm text-blue-100 leading-relaxed">
                        {activePhaseData.purpose}
                      </p>
                    </div>
                  )}
                </aside>

                <div className="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex items-center justify-center min-h-[500px] relative p-4">
                  <svg viewBox="0 0 800 480" className="w-full h-auto max-w-full drop-shadow-sm">
                    <defs>
                      <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                        <polygon points="0 0, 8 4, 0 8" fill="#3b82f6" />
                      </marker>
                      <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                        <polygon points="0 0, 8 4, 0 8" fill="#10b981" />
                      </marker>
                      <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                        <polygon points="0 0, 8 4, 0 8" fill="#f59e0b" />
                      </marker>
                      <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                        <polygon points="0 0, 8 4, 0 8" fill="#cbd5e1" />
                      </marker>
                    </defs>

                    {FLOWS.map((flow) => {
                      const isActive = activePhase === null || activePhase === flow.phase;
                      const coords = getLineCoords(flow.from, flow.to, flow.offset);
                      const strokeColor = isActive ? flow.color : '#cbd5e1';
                      const opacity = activePhase === null ? 0.4 : (isActive ? 1 : 0.1);
                      
                      let markerId = 'url(#arrow-gray)';
                      if (isActive) {
                        if (flow.color === '#3b82f6') markerId = 'url(#arrow-blue)';
                        if (flow.color === '#10b981') markerId = 'url(#arrow-green)';
                        if (flow.color === '#f59e0b') markerId = 'url(#arrow-orange)';
                      }

                      const animClass = isActive && activePhase !== null 
                        ? (flow.isDash ? 'anim-dash' : 'anim-solid') 
                        : (flow.isDash ? 'stroke-dasharray-6-4' : '');

                      return (
                        <g key={flow.id} className="fade-transition" style={{ opacity }}>
                          <line
                            x1={coords.startX} y1={coords.startY} x2={coords.endX} y2={coords.endY}
                            stroke={strokeColor}
                            strokeWidth={isActive && activePhase !== null ? 3 : 2}
                            markerEnd={markerId}
                            className={animClass}
                            style={flow.isDash && !isActive ? { strokeDasharray: '4 4' } : {}}
                          />
                          <rect x={coords.midX - 50} y={coords.midY - 12} width="100" height="24" fill="white" opacity="0.8" rx="4" />
                          <text
                            x={coords.midX} y={coords.midY + 4}
                            textAnchor="middle" fontSize="11"
                            fontWeight={isActive && activePhase !== null ? 'bold' : 'normal'}
                            fill={isActive ? strokeColor : '#94a3b8'}
                          >
                            {flow.label}
                          </text>
                        </g>
                      );
                    })}

                    {Object.values(NODES).map((node) => {
                      const NodeIcon = node.icon;
                      const isPartyInvolved = activePhase === null || activePhaseData?.parties.includes(node.id);
                      const isFaded = activePhase !== null && !isPartyInvolved;

                      return (
                        <g 
                          key={node.id} 
                          transform={`translate(${node.x - 70}, ${node.y - 45})`}
                          className="fade-transition"
                          style={{ opacity: isFaded ? 0.3 : 1 }}
                        >
                          <rect 
                            width="140" height="90" rx="8" fill="white" 
                            stroke={isPartyInvolved && activePhase !== null ? '#1e293b' : '#e2e8f0'}
                            strokeWidth={isPartyInvolved && activePhase !== null ? "3" : "2"}
                            className="drop-shadow-sm"
                          />
                          <foreignObject width="140" height="90">
                            <div className="w-full h-full flex flex-col items-center justify-center p-2 text-center">
                              <NodeIcon size={24} className={`mb-1 ${isPartyInvolved && activePhase !== null ? 'text-slate-800' : 'text-slate-500'}`} />
                              <span className={`text-xs font-bold leading-tight ${isPartyInvolved && activePhase !== null ? 'text-slate-900' : 'text-slate-700'}`}>
                                {node.label}
                              </span>
                              <span className="text-[9px] text-slate-500 mt-1 bg-slate-100 px-2 py-0.5 rounded-full whitespace-nowrap">
                                {node.role}
                              </span>
                            </div>
                          </foreignObject>
                        </g>
                      );
                    })}
                  </svg>

                  <div className="absolute top-4 right-4 bg-white/90 p-3 rounded-lg shadow-sm border border-slate-100 text-xs flex flex-col gap-2 pointer-events-none">
                    <div className="font-bold text-slate-600 mb-1">線の種類</div>
                    <div className="flex items-center gap-2"><div className="w-6 h-0.5 bg-blue-500"></div><span>アセット/権利の移動</span></div>
                    <div className="flex items-center gap-2"><div className="w-6 h-0.5 bg-orange-500"></div><span>リース貸与/転貸</span></div>
                    <div className="flex items-center gap-2"><div className="w-6 border-t-2 border-dashed border-emerald-500"></div><span>お金の移動 (代金/料/出資)</span></div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
