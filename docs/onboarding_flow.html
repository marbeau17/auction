    <style>
        body { margin: 0; padding: 0; background: #0f172a; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 8px rgba(59,130,246,0.4); }
            50% { box-shadow: 0 0 24px rgba(59,130,246,0.8); }
        }
        @keyframes progress-fill {
            from { width: 0%; }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slide-in-right {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.4); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .anim-fade-in-up {
            animation: fade-in-up 0.5s ease-out forwards;
        }
        .anim-slide-in-right {
            animation: slide-in-right 0.4s ease-out forwards;
        }
        .anim-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .anim-dot-pulse {
            animation: dot-pulse 1.5s ease-in-out infinite;
        }
        .progress-bar-animated {
            animation: progress-fill 1s ease-out forwards;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: progress-fill 1s ease-out forwards, shimmer 2s linear infinite;
        }
        .timeline-line {
            background: linear-gradient(180deg, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0.6) 50%, rgba(59,130,246,0.1) 100%);
        }
        .step-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-card:hover {
            transform: translateX(4px);
        }
        .tier-tab {
            transition: all 0.3s ease;
        }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>

        /* ===== 営業日計算ユーティリティ ===== */
        function addBusinessDays(startDate, days) {
            const result = new Date(startDate);
            let added = 0;
            while (added < days) {
                result.setDate(result.getDate() + 1);
                const dow = result.getDay();
                if (dow !== 0 && dow !== 6) added++;
            }
            return result;
        }

        function formatDate(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const dow = ['日','月','火','水','木','金','土'][date.getDay()];
            return `${m}/${d}（${dow}）`;
        }

        function parseDayRange(dayStr) {
            const nums = dayStr.match(/\d+/g);
            if (!nums) return { start: 0, end: 0 };
            if (nums.length === 1) return { start: parseInt(nums[0]), end: parseInt(nums[0]) };
            return { start: parseInt(nums[0]), end: parseInt(nums[1]) };
        }

        /* ===== プログレスバー ===== */
        function ProgressBar({ tier, activeStep }) {
            const pct = ((activeStep + 1) / tier.steps.length) * 100;
            return (
                <div className="mb-6">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-xs text-slate-400">進捗</span>
                        <span className="text-xs text-slate-400">{activeStep + 1} / {tier.steps.length} ステップ</span>
                    </div>
                    <div className="w-full h-2 bg-slate-700/50 rounded-full overflow-hidden">
                        <div
                            className="h-full rounded-full transition-all duration-700 ease-out"
                            style={{
                                width: `${pct}%`,
                                background: `linear-gradient(90deg, ${tier.gradientFrom}, ${tier.gradientTo})`
                            }}
                        />
                    </div>
                </div>
            );
        }

        /* ===== タイムラインステップ ===== */
        function TimelineStep({ step, index, isActive, isExpanded, onClick, tier, startDate, totalSteps }) {
            const IconComponent = Icons[step.icon];
            const range = parseDayRange(step.day);
            const estStart = startDate ? formatDate(addBusinessDays(startDate, range.start)) : null;
            const estEnd = range.start !== range.end && startDate ? formatDate(addBusinessDays(startDate, range.end)) : null;

            return (
                <div
                    className={`step-card relative anim-fade-in-up`}
                    style={{ animationDelay: `${index * 80}ms` }}
                >
                    {/* 接続線 */}
                    {index < totalSteps - 1 && (
                        <div
                            className="absolute left-[23px] top-[52px] w-[2px]"
                            style={{
                                height: isExpanded ? '100%' : '48px',
                                background: `linear-gradient(180deg, ${tier.colorHex}88, ${tier.colorHex}22)`,
                                transition: 'height 0.3s ease'
                            }}
                        />
                    )}

                    <div
                        onClick={onClick}
                        className={`relative flex items-start gap-4 p-4 rounded-xl cursor-pointer border transition-all duration-300 ${
                            isActive
                                ? `bg-gradient-to-r ${tier.bgClass} ${tier.borderClass}`
                                : 'border-transparent hover:bg-slate-800/40 hover:border-slate-700/50'
                        }`}
                    >
                        {/* ノードドット */}
                        <div className="flex-shrink-0 relative">
                            <div
                                className={`w-[48px] h-[48px] rounded-xl flex items-center justify-center transition-all duration-300 ${
                                    step.milestone ? 'anim-pulse-glow' : ''
                                }`}
                                style={{
                                    background: isActive
                                        ? `linear-gradient(135deg, ${tier.gradientFrom}, ${tier.gradientTo})`
                                        : 'rgba(51,65,85,0.5)',
                                    boxShadow: isActive ? `0 0 20px ${tier.colorHex}44` : 'none'
                                }}
                            >
                                {IconComponent && <IconComponent s={22} c={isActive ? 'text-white' : 'text-slate-400'} />}
                            </div>
                            {step.milestone && (
                                <div
                                    className="absolute -top-1 -right-1 w-4 h-4 rounded-full border-2 border-slate-900 flex items-center justify-center"
                                    style={{ background: tier.colorHex }}
                                >
                                    <svg width="8" height="8" viewBox="0 0 24 24" fill="white"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                                </div>
                            )}
                        </div>

                        {/* コンテンツ */}
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-1">
                                <span
                                    className="text-[11px] font-bold px-2 py-0.5 rounded-full"
                                    style={{
                                        background: `${tier.colorHex}22`,
                                        color: tier.colorHex
                                    }}
                                >
                                    {step.day}
                                </span>
                                {estStart && (
                                    <span className="text-[11px] text-slate-500 flex items-center gap-1">
                                        <Icons.Calendar s={11} />
                                        {estStart}{estEnd ? ` - ${estEnd}` : ''}
                                    </span>
                                )}
                            </div>
                            <h4 className={`font-semibold text-sm ${isActive ? 'text-white' : 'text-slate-300'}`}>
                                {step.title}
                            </h4>

                            {/* 展開コンテンツ */}
                            <div className={`overflow-hidden transition-all duration-300 ${isExpanded ? 'max-h-[600px] opacity-100 mt-3' : 'max-h-0 opacity-0'}`}>
                                <p className="text-sm text-slate-400 leading-relaxed mb-3">
                                    {step.desc}
                                </p>
                                {step.docs && step.docs.length > 0 && (
                                    <div className="bg-slate-800/60 rounded-lg p-3 border border-slate-700/30">
                                        <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-1">
                                            <Icons.Clipboard s={12} />
                                            必要書類
                                        </div>
                                        <div className="flex flex-wrap gap-1.5">
                                            {step.docs.map((doc, i) => (
                                                <span key={i} className="text-xs bg-slate-700/60 text-slate-300 px-2 py-1 rounded-md">
                                                    {doc}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 展開アイコン */}
                        <div className={`flex-shrink-0 mt-1 transition-transform duration-300 ${isExpanded ? 'rotate-90' : ''}`}>
                            <Icons.ChevronRight s={16} c="text-slate-500" />
                        </div>
                    </div>
                </div>
            );
        }

        /* ===== サイドパネル ===== */
        function SidePanel({ step, tier, startDate }) {
            if (!step) return null;
            const range = parseDayRange(step.day);
            const estStart = startDate ? formatDate(addBusinessDays(startDate, range.start)) : null;
            const estEnd = range.start !== range.end && startDate ? formatDate(addBusinessDays(startDate, range.end)) : null;
            const IconComp = Icons[step.icon];

            return (
                <div className="anim-slide-in-right">
                    <div
                        className="rounded-2xl border p-6"
                        style={{
                            borderColor: `${tier.colorHex}33`,
                            background: `linear-gradient(135deg, ${tier.colorHex}08, transparent)`
                        }}
                    >
                        <div className="flex items-center gap-3 mb-4">
                            <div
                                className="w-12 h-12 rounded-xl flex items-center justify-center"
                                style={{ background: `linear-gradient(135deg, ${tier.gradientFrom}, ${tier.gradientTo})` }}
                            >
                                {IconComp && <IconComp s={24} c="text-white" />}
                            </div>
                            <div>
                                <span
                                    className="text-[11px] font-bold px-2 py-0.5 rounded-full"
                                    style={{ background: `${tier.colorHex}22`, color: tier.colorHex }}
                                >
                                    {step.day}
                                </span>
                                <h3 className="text-white font-bold mt-1">{step.title}</h3>
                            </div>
                        </div>

                        {estStart && (
                            <div className="flex items-center gap-2 mb-4 bg-slate-800/40 rounded-lg px-3 py-2">
                                <Icons.Calendar s={14} c="text-slate-400" />
                                <span className="text-sm text-slate-300">
                                    予定日: {estStart}{estEnd ? ` ~ ${estEnd}` : ''}
                                </span>
                            </div>
                        )}

                        <p className="text-sm text-slate-400 leading-relaxed mb-5">
                            {step.desc}
                        </p>

                        {step.docs && step.docs.length > 0 && (
                            <div>
                                <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Icons.FileText s={14} />
                                    必要書類・ドキュメント
                                </h4>
                                <div className="space-y-2">
                                    {step.docs.map((doc, i) => (
                                        <div
                                            key={i}
                                            className="flex items-center gap-2 text-sm text-slate-300 bg-slate-800/50 rounded-lg px-3 py-2 border border-slate-700/30 anim-fade-in-up"
                                            style={{ animationDelay: `${i * 50}ms` }}
                                        >
                                            <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: tier.colorHex }} />
                                            {doc}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step.milestone && (
                            <div className="mt-5 flex items-center gap-2 text-xs font-semibold rounded-lg px-3 py-2" style={{ background: `${tier.colorHex}15`, color: tier.colorHex }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                                マイルストーン
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ===== メインApp ===== */
        function App() {
            const [activeTier, setActiveTier] = useState('ume');
            const [activeStep, setActiveStep] = useState(0);
            const [expandedStep, setExpandedStep] = useState(0);
            const [startDate, setStartDate] = useState('');
            const [animKey, setAnimKey] = useState(0);

            const tier = TIERS[activeTier];
            const parsedStart = startDate ? new Date(startDate) : null;

            function switchTier(tierId) {
                setActiveTier(tierId);
                setActiveStep(0);
                setExpandedStep(0);
                setAnimKey(k => k + 1);
            }

            function toggleStep(index) {
                setActiveStep(index);
                setExpandedStep(expandedStep === index ? -1 : index);
            }

            const completionDate = parsedStart
                ? formatDate(addBusinessDays(parsedStart, tier.totalDays))
                : null;

            return (
                <div className="min-h-screen bg-slate-900 text-white">
                    {/* ヘッダー */}
                    <header className="border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-6 py-6">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div>
                                    <div className="flex items-center gap-3 mb-1">
                                        <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                                            <Icons.Rocket s={18} c="text-white" />
                                        </div>
                                        <h1 className="text-xl font-bold">CVLPOS オンボーディングフロー</h1>
                                    </div>
                                    <p className="text-sm text-slate-400 ml-11">松竹梅プラン別 導入プロセスタイムライン</p>
                                </div>

                                {/* 開始日入力 */}
                                <div className="flex items-center gap-3 bg-slate-800/60 rounded-xl px-4 py-2.5 border border-slate-700/50">
                                    <Icons.Calendar s={16} c="text-slate-400" />
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase tracking-wider block">開始予定日</label>
                                        <input
                                            type="date"
                                            value={startDate}
                                            onChange={e => setStartDate(e.target.value)}
                                            className="bg-transparent text-sm text-white outline-none border-none w-[140px]"
                                        />
                                    </div>
                                    {completionDate && (
                                        <div className="border-l border-slate-700 pl-3 ml-1">
                                            <div className="text-[10px] text-slate-500 uppercase tracking-wider">完了予定</div>
                                            <div className="text-sm font-semibold" style={{ color: tier.colorHex }}>{completionDate}</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* ティアタブ */}
                    <div className="border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex gap-1 py-3">
                                {Object.values(TIERS).map(t => (
                                    <button
                                        key={t.id}
                                        onClick={() => switchTier(t.id)}
                                        className={`tier-tab relative px-6 py-3 rounded-xl text-sm font-semibold flex items-center gap-3 ${
                                            activeTier === t.id
                                                ? 'text-white'
                                                : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/40'
                                        }`}
                                        style={activeTier === t.id ? {
                                            background: `linear-gradient(135deg, ${t.gradientFrom}22, ${t.gradientTo}11)`,
                                            border: `1px solid ${t.colorHex}44`
                                        } : { border: '1px solid transparent' }}
                                    >
                                        <span
                                            className="w-8 h-8 rounded-lg flex items-center justify-center text-base font-bold"
                                            style={activeTier === t.id ? {
                                                background: `linear-gradient(135deg, ${t.gradientFrom}, ${t.gradientTo})`,
                                                color: 'white'
                                            } : {
                                                background: 'rgba(51,65,85,0.5)',
                                                color: '#94a3b8'
                                            }}
                                        >
                                            {t.label}
                                        </span>
                                        <div className="text-left">
                                            <div>{t.name}</div>
                                            <div className="text-[10px] font-normal" style={{ color: activeTier === t.id ? `${t.colorHex}` : '#64748b' }}>
                                                {t.subtitle} / {t.totalDays}営業日
                                            </div>
                                        </div>
                                        {activeTier === t.id && (
                                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-0.5 rounded-full" style={{ background: t.colorHex }} />
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* メインコンテンツ */}
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* サマリーカード */}
                        <div className="grid grid-cols-4 gap-4 mb-8">
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
                                <div className="text-[11px] text-slate-500 uppercase tracking-wider mb-1">所要日数</div>
                                <div className="text-2xl font-bold" style={{ color: tier.colorHex }}>{tier.totalDays}<span className="text-sm font-normal text-slate-400">営業日</span></div>
                            </div>
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
                                <div className="text-[11px] text-slate-500 uppercase tracking-wider mb-1">ステップ数</div>
                                <div className="text-2xl font-bold text-white">{tier.steps.length}<span className="text-sm font-normal text-slate-400">ステップ</span></div>
                            </div>
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
                                <div className="text-[11px] text-slate-500 uppercase tracking-wider mb-1">契約書類</div>
                                <div className="text-2xl font-bold text-white">
                                    {tier.id === 'ume' ? '3' : tier.id === 'take' ? '5' : '9'}
                                    <span className="text-sm font-normal text-slate-400">種類</span>
                                </div>
                            </div>
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/30">
                                <div className="text-[11px] text-slate-500 uppercase tracking-wider mb-1">マイルストーン</div>
                                <div className="text-2xl font-bold text-white">
                                    {tier.steps.filter(s => s.milestone).length}
                                    <span className="text-sm font-normal text-slate-400">件</span>
                                </div>
                            </div>
                        </div>

                        <ProgressBar tier={tier} activeStep={activeStep} />

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* タイムライン */}
                            <div className="lg:col-span-2" key={animKey}>
                                <div className="space-y-1">
                                    {tier.steps.map((step, i) => (
                                        <TimelineStep
                                            key={`${activeTier}-${i}`}
                                            step={step}
                                            index={i}
                                            isActive={activeStep === i}
                                            isExpanded={expandedStep === i}
                                            onClick={() => toggleStep(i)}
                                            tier={tier}
                                            startDate={parsedStart}
                                            totalSteps={tier.steps.length}
                                        />
                                    ))}
                                </div>
                            </div>

                            {/* サイドパネル */}
                            <div className="hidden lg:block">
                                <div className="sticky top-8">
                                    <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">ステップ詳細</h3>
                                    <SidePanel
                                        key={`${activeTier}-${activeStep}`}
                                        step={tier.steps[activeStep]}
                                        tier={tier}
                                        startDate={parsedStart}
                                    />

                                    {/* 全必要書類一覧 */}
                                    <div className="mt-6 rounded-2xl border border-slate-700/30 bg-slate-800/20 p-5">
                                        <h4 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                                            <Icons.Clipboard s={14} />
                                            全ステップ必要書類一覧
                                        </h4>
                                        <div className="space-y-3 max-h-[300px] overflow-y-auto scrollbar-thin pr-1">
                                            {tier.steps.filter(s => s.docs && s.docs.length > 0).map((s, si) => (
                                                <div key={si}>
                                                    <div className="text-[11px] font-semibold mb-1.5" style={{ color: tier.colorHex }}>
                                                        {s.day}: {s.title}
                                                    </div>
                                                    <div className="flex flex-wrap gap-1">
                                                        {s.docs.map((doc, di) => (
                                                            <span key={di} className="text-[11px] bg-slate-700/40 text-slate-400 px-2 py-0.5 rounded">
                                                                {doc}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* フッター */}
                    <footer className="border-t border-slate-800 mt-12">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <span className="text-xs text-slate-600">CVLPOS - Commercial Vehicle Lease-back POS</span>
                            <span className="text-xs text-slate-600">松竹梅プラン オンボーディングフロー v1.0</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
