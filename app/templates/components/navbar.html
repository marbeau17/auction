<nav class="sidebar-nav" aria-label="メインナビゲーション">
  <div class="sidebar-nav__brand">
    <a href="/dashboard"
       hx-get="/dashboard"
       hx-target="#main-content"
       hx-push-url="true">
      <span class="sidebar-nav__logo">LB</span>
      <span class="sidebar-nav__title">リースバック査定</span>
    </a>
  </div>

  <ul class="sidebar-nav__menu">
    <li class="sidebar-nav__item {% if current_path == '/dashboard' %}sidebar-nav__item--active{% endif %}">
      <a href="/dashboard"
         class="sidebar-nav__link"
         hx-get="/dashboard"

          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>ダッシュボード</span>
      </a>
    </li>

    <li class="sidebar-nav__item {% if current_path and current_path.startswith('/simulation') %}sidebar-nav__item--active{% endif %}">
      <a href="/simulation/new"
         class="sidebar-nav__link"
         hx-get="/simulation/new"
         hx-target="#main-content"
         hx-push-url="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>シミュレーション</span>
      </a>

    <li class="sidebar-nav__item {% if current_path and current_path.startswith('/market-data') %}sidebar-nav__item--active{% endif %}">
      <a href="/market-data"
         class="sidebar-nav__link"
         hx-get="/market-data"
         hx-target="#main-content"
         hx-push-url="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>相場データ</span>
      </a>

  <div class="sidebar-nav__footer">
    {% if user %}
    <div class="sidebar-nav__user">
      <span class="sidebar-nav__user-name">{{ user.email|default('') }}</span>
    </div>
    {% endif %}
    <a href="/login"
       class="sidebar-nav__link sidebar-nav__link--logout"
       hx-post="/api/auth/logout"
       hx-target="body"
       hx-swap="innerHTML">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
