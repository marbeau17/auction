{% extends "base.html" %}
{% block title %}弥生連携ステータス - CVLPOS{% endblock %}
{% block content %}
<div class="container">
    <div class="page-head">
        <div>
            <span class="tag">松プラン</span>
            <h1>弥生連携</h1>
            <div class="sub">弥生会計とのデータ連携状況を確認・管理します。</div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" role="status" aria-live="polite"
         style="display:none; position:fixed; top:16px; right:16px; padding:12px 16px; border-radius:8px; color:#fff; font-weight:500; z-index:1000;"></div>

    <!-- Connection Status (HTMX polls /status every 30 s) -->
    <div class="card" style="margin-top: 20px; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <h3>接続ステータス</h3>
        <div id="yayoi-status"
             hx-get="/api/v1/yayoi/status"
             hx-trigger="load, every 30s"
             hx-swap="none"
             hx-on::after-request="renderYayoiStatus(event)">
            <div style="display: flex; align-items: center; gap: 12px; margin-top: 12px;">
                <span id="connection-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: #cbd5e0; display: inline-block;"></span>
                <span id="connection-text" style="color: #718096;">確認中...</span>
            </div>
        </div>
        <div style="margin-top: 16px;">
            <button class="btn-mx primary" id="btn-connect" onclick="connectYayoi()">接続する</button>
        </div>
    </div>

    <!-- Monthly Sync -->
    <div class="card" style="margin-top: 20px; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <h3>月次同期</h3>
        <p style="color:#4a5568; font-size:0.9em;">当月分の承認済み請求書を弥生会計に仕訳として送信します。</p>
        <div style="display:flex; gap:12px; align-items:center; margin-top:12px;">
            <label for="sync-fund-id" style="font-size:0.9em;">Fund ID:</label>
            <input type="text" id="sync-fund-id" placeholder="fund UUID" style="flex:1; max-width:320px; padding:6px 10px; border:1px solid #cbd5e0; border-radius:6px;">
            <button class="btn-mx primary" id="btn-sync" onclick="runMonthlySync()">月次同期を実行</button>
            <span id="sync-spinner" style="display:none;">同期中...</span>
        </div>
    </div>

    <!-- Sync History -->
    <div class="card" style="margin-top: 20px; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <h3>同期履歴</h3>
        <div hx-get="/api/v1/yayoi/sync-log?limit=50"
             hx-trigger="load, every 60s, refresh-sync-log from:body"
             hx-swap="none"
             hx-on::after-request="renderSyncLog(event)">
            <table style="width: 100%; border-collapse: collapse; margin-top: 12px;">
                <thead>
                    <tr style="border-bottom: 2px solid #e2e8f0;">
                        <th style="text-align: left; padding: 8px;">日時</th>
                        <th style="text-align: left; padding: 8px;">種別</th>
                        <th style="text-align: left; padding: 8px;">参照</th>
                        <th style="text-align: left; padding: 8px;">ステータス</th>
                    </tr>
                </thead>
                <tbody id="sync-history">
                    <tr>
                        <td colspan="4" style="padding: 24px; text-align: center; color: #a0aec0;">
                            履歴を読み込み中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Settings -->
    <div class="card" style="margin-top: 20px; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <h3>連携設定</h3>
        <form id="yayoi-settings-form" onsubmit="saveSettings(event)">
            <div class="form-group" style="margin-top: 12px;">
                <label>
                    <input type="checkbox" name="yayoi_auto_sync_monthly" id="yayoi_auto_sync_monthly"> 毎月自動同期（月初5日 02:00 JST）
                </label>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label>
                    <input type="checkbox" name="yayoi_sync_invoices" id="yayoi_sync_invoices"> 請求書データを同期
                </label>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label>
                    <input type="checkbox" name="yayoi_sync_journals" id="yayoi_sync_journals"> 仕訳データを同期
                </label>
            </div>
            <div style="margin-top:16px;">
                <button type="submit" class="btn-mx primary">設定を保存</button>
            </div>
        </form>
    </div>
</div>

<script>
(function () {
    const csrfHeader = () => {
        const meta = document.querySelector('meta[name="csrf-token"]');
        return meta ? { "X-CSRF-Token": meta.getAttribute("content") } : {};
    };

    function showToast(msg, kind = "success") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.style.background = kind === "success" ? "#38a169" : (kind === "warn" ? "#d69e2e" : "#e53e3e");
        el.style.display = "block";
        setTimeout(() => { el.style.display = "none"; }, 4200);
    }

    // ------- Status rendering (HTMX after-request hook) -------
    window.renderYayoiStatus = function (event) {
        try {
            const xhr = event.detail && event.detail.xhr;
            if (!xhr || xhr.status >= 400) return;
            const data = JSON.parse(xhr.responseText || "{}");
            const indicator = document.getElementById("connection-indicator");
            const text = document.getElementById("connection-text");
            const btn = document.getElementById("btn-connect");
            const state = data.state || "disconnected";
            if (state === "connected") {
                indicator.style.background = "#38a169";
                text.textContent = "接続中";
                text.style.color = "#2f855a";
                btn.textContent = "再接続";
            } else if (state === "expired") {
                indicator.style.background = "#d69e2e";
                text.textContent = "トークン期限切れ — 再接続してください";
                text.style.color = "#975a16";
                btn.textContent = "再接続する";
            } else {
                indicator.style.background = "#cbd5e0";
                text.textContent = "未接続";
                text.style.color = "#718096";
                btn.textContent = "接続する";
            }
        } catch (e) {
            console.warn("renderYayoiStatus failed", e);
        }
    };

    // ------- Connect button -------
    window.connectYayoi = async function () {
        try {
            const resp = await fetch("/api/v1/yayoi/connect", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json", ...csrfHeader() },
                body: "{}",
            });
            if (!resp.ok) {
                const err = await resp.text();
                showToast("接続の開始に失敗しました: " + err, "error");
                return;
            }
            const data = await resp.json();
            const url = data.authorize_url || data.authorizeUrl;
            if (!url) {
                showToast("認可URLが取得できませんでした", "error");
                return;
            }
            window.location.href = url;
        } catch (e) {
            showToast("接続エラー: " + e.message, "error");
        }
    };

    // ------- Monthly sync -------
    window.runMonthlySync = async function () {
        const fundId = document.getElementById("sync-fund-id").value.trim();
        if (!fundId) {
            showToast("Fund ID を入力してください", "warn");
            return;
        }
        const today = new Date();
        const month = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, "0") + "-01";
        const btn = document.getElementById("btn-sync");
        const spinner = document.getElementById("sync-spinner");
        btn.disabled = true;
        spinner.style.display = "inline";
        try {
            const resp = await fetch("/api/v1/yayoi/sync-invoices", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json", ...csrfHeader() },
                body: JSON.stringify({ fund_id: fundId, month }),
            });
            const data = await resp.json();
            if (!resp.ok) {
                showToast("同期失敗: " + (data.detail || resp.statusText), "error");
            } else {
                showToast(`同期完了: ${data.synced ?? 0} 件同期 / ${data.skipped ?? 0} 件スキップ / ${data.failed ?? 0} 件失敗`);
                // Trigger the sync-log HTMX refresh.
                htmx.trigger(document.body, "refresh-sync-log");
            }
        } catch (e) {
            showToast("同期エラー: " + e.message, "error");
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
        }
    };

    // ------- Sync-log rendering -------
    window.renderSyncLog = function (event) {
        try {
            const xhr = event.detail && event.detail.xhr;
            if (!xhr || xhr.status >= 400) return;
            const payload = JSON.parse(xhr.responseText || "{}");
            const items = payload.items || [];
            const tbody = document.getElementById("sync-history");
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="padding:24px; text-align:center; color:#a0aec0;">履歴はまだありません。</td></tr>';
                return;
            }
            const statusBadge = (s) => {
                const colors = { success: "#38a169", failed: "#e53e3e", skipped: "#a0aec0", dry_run: "#3182ce" };
                const c = colors[s] || "#718096";
                return `<span style="background:${c}; color:#fff; padding:2px 8px; border-radius:10px; font-size:0.8em;">${s}</span>`;
            };
            tbody.innerHTML = items.map(r => {
                const d = r.created_at ? new Date(r.created_at).toLocaleString("ja-JP") : "-";
                return `<tr style="border-bottom:1px solid #edf2f7;">
                    <td style="padding:8px;">${d}</td>
                    <td style="padding:8px;">${r.sync_type || "-"}</td>
                    <td style="padding:8px;">${r.reference || "-"}</td>
                    <td style="padding:8px;">${statusBadge(r.status || "-")}</td>
                </tr>`;
            }).join("");
        } catch (e) {
            console.warn("renderSyncLog failed", e);
        }
    };

    // ------- Settings form -------
    async function loadSettings() {
        try {
            const resp = await fetch("/api/v1/yayoi/settings", { credentials: "include" });
            if (!resp.ok) return;
            const s = await resp.json();
            document.getElementById("yayoi_auto_sync_monthly").checked = !!s.yayoi_auto_sync_monthly;
            document.getElementById("yayoi_sync_invoices").checked = s.yayoi_sync_invoices !== false;
            document.getElementById("yayoi_sync_journals").checked = s.yayoi_sync_journals !== false;
        } catch (e) {
            console.warn("loadSettings failed", e);
        }
    }

    window.saveSettings = async function (ev) {
        ev.preventDefault();
        const body = {
            yayoi_auto_sync_monthly: document.getElementById("yayoi_auto_sync_monthly").checked,
            yayoi_sync_invoices: document.getElementById("yayoi_sync_invoices").checked,
            yayoi_sync_journals: document.getElementById("yayoi_sync_journals").checked,
        };
        try {
            const resp = await fetch("/api/v1/yayoi/settings", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json", ...csrfHeader() },
                body: JSON.stringify(body),
            });
            if (!resp.ok) {
                const err = await resp.text();
                showToast("設定の保存に失敗しました: " + err, "error");
                return;
            }
            showToast("連携設定を保存しました");
        } catch (e) {
            showToast("保存エラー: " + e.message, "error");
        }
    };

    document.addEventListener("DOMContentLoaded", loadSettings);
})();
</script>
{% endblock %}
