<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット - CVLPOS</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-card__header">
                <h1 class="login-card__title">パスワードリセット</h1>
                <p style="color:var(--text-muted);margin-top:8px">登録メールアドレスにリセットリンクを送信します</p>
            </div>
            <form hx-post="/auth/forgot-password" hx-target="#reset-result" hx-swap="innerHTML">
                <div class="form-group">
                    <label class="form-label">メールアドレス</label>
                    <input type="email" name="email" class="form-input" required placeholder="admin@carchs.com">
                </div>
                <div id="reset-result"></div>
                <button type="submit" class="btn btn--primary btn--block btn--lg" style="margin-top:16px">
                    リセットリンクを送信
                </button>
            </form>
            <div style="margin-top:16px;text-align:center">
                <a href="/login" style="color:var(--primary)">← ログインに戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
