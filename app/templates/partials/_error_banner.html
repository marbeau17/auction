{# Shared dismissible error banner. Renders only when `error_banner` is truthy. #}
{% if error_banner %}
<div class="error-banner" role="alert" aria-live="assertive"
     style="display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:16px;
            background:#fdecea;border:1px solid #f5c2c0;border-left:4px solid #d93025;
            color:#5b1a18;border-radius:6px;font-size:0.9rem;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="flex:none;">
        <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span style="flex:1;">{{ error_banner }}</span>
    <button type="button" class="error-banner__dismiss" aria-label="閉じる"
            onclick="this.closest('.error-banner').remove()"
            style="background:none;border:none;color:inherit;cursor:pointer;font-size:1.1rem;line-height:1;padding:4px 6px;">
        &times;
    </button>
</div>
{% endif %}
