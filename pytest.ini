[pytest]
testpaths = tests
asyncio_mode = auto
# Coverage is scoped to the modules that have real unit tests today.
# Raise the threshold as more modules gain coverage.
addopts = --cov=app.core.acquisition_price --cov=app.core.contract_generator --cov=app.core.market_data_importer --cov=app.core.lease_contract_importer --cov=app.db.repositories.invoice_repo --cov-fail-under=50
markers =
    e2e: End-to-end tests
    monkey: Monkey/fuzz tests
    slow: Slow tests
